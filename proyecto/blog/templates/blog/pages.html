{% extends "blog/base.html" %}

{% block contenido %}

<h2>Pages</h2>

{% if object_list %}

{% for page in object_list %}

<h3>{{page.title}}</h3>

<p>{{page.subtitle}}</p>

<a href="/pages/{{page.id}}/">Leer más</a>

<hr>

{% endfor %}

{% else %}

<p>No hay páginas aún</p>

{% endif %}

{% endblock %}
